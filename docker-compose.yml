# Convenience docker-compose for MySQL + Redis.
# You already have both running natively, so this is optional.
# Use this if you want to start fresh on a new machine.
#
# Usage:
#   docker compose up -d        # start MySQL + Redis in background
#   docker compose down         # stop
#   docker compose logs -f      # tail logs

services:
  mysql:
    image: mysql:8.0
    container_name: hms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: system
      MYSQL_DATABASE: hms_db
    ports:
      - "3306:3306"
    volumes:
      - hms-mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psystem"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

volumes:
  hms-mysql-data:
