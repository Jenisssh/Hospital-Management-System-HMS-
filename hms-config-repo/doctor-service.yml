server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hms_db
    username: root
    password: system
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      connect-timeout: 1000ms
      lettuce:
        shutdown-timeout: 100ms
  cache:
    type: redis

# Service-specific cache settings
hms:
  cache:
    namespace: doctor-service
    ttl-seconds: 600   # 10 min
