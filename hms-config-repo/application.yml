# Shared config — every service that fetches from config-server merges this in.
# Service-specific overrides go in {service-name}.yml.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.hms: DEBUG
    org.springframework.cloud: INFO
